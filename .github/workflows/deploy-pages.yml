name: Deploy to GitHub Pages

# Builds the site and publishes it to GitHub Pages on every push to main
# (and on demand via the Actions tab). The committed dist/ is for direct
# hosting; CI rebuilds from source so Pages is always fresh. The committed
# WebAssembly engine means CI needs no C++ toolchain — just Node.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # NOTE: Pages must be enabled once via Settings → Pages → Source:
      # "GitHub Actions" (see DEPLOY.md). Auto-enable (enablement: true) is not
      # used because the workflow token can't create the Pages site in this repo
      # ("Resource not accessible by integration").
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
